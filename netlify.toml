# netlify.toml
# Redirects no-extension URLs to their .html versions
# Only targets the three blog subdirectories where GSC duplicates were found

[[redirects]]
  from = "/blog/niche/*"
  to = "/blog/niche/:splat.html"
  status = 301

[[redirects]]
  from = "/blog/country/*"
  to = "/blog/country/:splat.html"
  status = 301

[[redirects]]
  from = "/blog/niche-country/*"
  to = "/blog/niche-country/:splat.html"
  status = 301